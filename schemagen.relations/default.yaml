# Explicit relation mapping. Leave empty if you do not want generated relation fields.
tables: {}

# Recommended grouped format. Split files by domain if your schema is large:
# schemagen.relations/
#   auth.yaml
#   org.yaml
#   catalog.yaml
#   inventory.yaml
#   sales.yaml
#   menu.yaml
#
# Example file content:
# tables:
#   orders:
#     relations:
#       - kind: belongs_to
#         target_table: users
#         foreign_key: user_id
#         target_key: id
#
#   users:
#     relations:
#       - kind: has_many
#         target_table: orders
#         foreign_key: user_id
#         target_key: id
#
#       - kind: has_one
#         target_table: user_profiles
#         foreign_key: user_id
#         target_key: id
#
#       - kind: many_to_many
#         target_table: roles
#         join_table: user_roles
#         join_foreign_key: user_id
#         join_target_key: role_id
#         source_key: id
#         target_key: id
#
# Legacy flat format is still supported:
# relations:
#   - table: orders
#     kind: belongs_to
#     target_table: users
#     foreign_key: user_id
#     target_key: id
